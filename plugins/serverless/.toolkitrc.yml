tasks:
  ServerlessRun: './lib/tasks/run'
  ServerlessDeploy: './lib/tasks/deploy'
  ServerlessProvision: './lib/tasks/provision'
  ServerlessTeardown: './lib/tasks/teardown'

optionsSchema: './lib/schema'

version: 2

options:
  hooks:
    - CircleCi:
        workflows:
          - name: 'pr-close'
            jobs:
              - name: 'teardown-review'
                requires: []
        jobs:
          - name: 'teardown-review'
            steps:
              pre:
                - tool-kit/serverless-assume-role:
                    aws-account-id: !toolkit/option '@dotcom-tool-kit/serverless.awsAccountId'
                    system-code: !toolkit/option '@dotcom-tool-kit/serverless.systemCode'
