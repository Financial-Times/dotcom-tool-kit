parameters:
  executor:
    default: default
    type: executor
  npm-version:
    description: This value is deprecated and no longer used. We now use Node's bundled version of npm.
    default: ''
    type: string
  use-cloudsmith-package-registry:
    description: Toggle to install npm packages from cloudsmith registry
    default: false
    type: boolean

executor: << parameters.executor >>

steps:
  - attach-workspace
  - when:
      condition: << parameters.npm-version >>
      steps:
        - run: sudo npm install -g npm@$PARAM_NPM_VERSION
  - when:
      condition: << parameters.use-cloudsmith-package-registry >>
      steps:
        - cloudsmith-npm/configure_npm:
            repository: financial-times-internal-releases
        - run: |
            echo "registry=https://npm.packages.ft.com/financial-times-internal-releases/" >> .npmrc &&
            echo "//npm.packages.ft.com/financial-times-internal-releases/:_authToken=$CLOUDSMITH_OIDC_TOKEN" >> .npmrc
  - node/install-packages
  - persist-workspace:
      path: .
